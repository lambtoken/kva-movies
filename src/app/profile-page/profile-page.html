<div class="profile-container">
  <div class="profile-card">
    <h1>Profile</h1>
    
    <div *ngIf="message" class="message" [class.success]="message.includes('successfully')">
      {{ message }}
    </div>

    <div *ngIf="user" class="profile-content">
      <!-- View Mode -->
      <div *ngIf="!isEditing" class="profile-info">
        <div class="info-group">
          <label>First Name:</label>
          <span>{{ user.firstName }}</span>
        </div>
        
        <div class="info-group">
          <label>Last Name:</label>
          <span>{{ user.lastName }}</span>
        </div>
        
        <div class="info-group">
          <label>Email:</label>
          <span>{{ user.email }}</span>
        </div>
        
        <div class="info-group">
          <label>Phone:</label>
          <span>{{ user.phone }}</span>
        </div>
        
        <div class="info-group">
          <label>Address:</label>
          <span>{{ user.address }}</span>
        </div>
        
        <div class="info-group">
          <label>Reservations:</label>
          <span>{{ user.reservations.length }} tickets</span>
        </div>
        
        <div class="info-group">
          <label>Favorite Genres:</label>
          <span>{{ user.favoriteGenres.length > 0 ? user.favoriteGenres.join(', ') : 'None selected' }}</span>
        </div>
        
        <button class="edit-btn" (click)="startEditing()">Edit Profile</button>
      </div>

      <!-- Edit Mode -->
      <div *ngIf="isEditing" class="edit-form">
        <div class="form-group">
          <label for="firstName">First Name:</label>
          <input 
            type="text" 
            id="firstName" 
            [(ngModel)]="editForm.firstName" 
            required
          >
        </div>
        
        <div class="form-group">
          <label for="lastName">Last Name:</label>
          <input 
            type="text" 
            id="lastName" 
            [(ngModel)]="editForm.lastName" 
            required
          >
        </div>
        
        <div class="form-group">
          <label for="email">Email:</label>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="editForm.email" 
            required
          >
        </div>
        
        <div class="form-group">
          <label for="phone">Phone:</label>
          <input 
            type="tel" 
            id="phone" 
            [(ngModel)]="editForm.phone" 
            required
          >
        </div>
        
        <div class="form-group">
          <label for="address">Address:</label>
          <textarea 
            id="address" 
            [(ngModel)]="editForm.address" 
            rows="3"
            required
          ></textarea>
        </div>
        
        <!-- Favorite Genres Selection -->
        <div class="form-group">
          <label>Favorite Genres:</label>
          <div class="genres-container">
            <div class="genre-checkboxes">
              <div 
                *ngFor="let genre of availableGenres" 
                class="genre-option"
              >
                <input 
                  type="checkbox" 
                  [id]="'genre-' + genre" 
                  [checked]="isGenreSelected(genre)"
                  (change)="toggleGenre(genre)"
                  class="genre-checkbox"
                >
                <label [for]="'genre-' + genre" class="genre-label">
                  {{ genre }}
                </label>
              </div>
            </div>
          </div>
        </div>
        
        <div class="button-group">
          <button class="save-btn" (click)="saveChanges()">Save Changes</button>
          <button class="cancel-btn" (click)="cancelEditing()">Cancel</button>
        </div>
      </div>
    </div>

    <div *ngIf="!user" class="no-user">
      <p>No user data found. Please log in.</p>
    </div>
  </div>
</div>
